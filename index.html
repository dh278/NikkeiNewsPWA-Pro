<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#1976d2">

<title>NikkeiNewsPWA Pro</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<link rel="apple-touch-icon" href="assets/icons/icon-192.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.js"></script>
</head>

<body>

<header class="header">
    <h1>📰 NikkeiNewsPWA Pro</h1>

    <input
        id="searchBox"
        type="search"
        placeholder="記事・企業名を検索">
</header>

<nav class="category-bar">

<button class="tab active">今日</button>

<button class="tab">重要</button>

<button class="tab">AI</button>

<button class="tab">半導体</button>

<button class="tab">物流</button>

<button class="tab">金融</button>

<button class="tab">地域企業</button>

</nav>

<main>

<section id="dashboard">

<h2>今日の重要ニュース</h2>

<div id="newsList"></div>

</section>

<section id="pdfArea">

<h2>PDF取込</h2>

<input
type="file"
id="pdfFile"
accept=".pdf">

<button id="analyzeBtn">

解析開始

</button>

</section>

</main>

<footer>

<button>🏠</button>

<button>🔍</button>

<button>📄</button>

<button>⭐</button>

<button>⚙️</button>

</footer>

<script src="app.js"></script>

</body>

</html>
